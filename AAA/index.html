<!DOCTYPE html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início — Mapa Interativo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="public/assets/CSS/style.css">
</head>

<body>

<div id="header-slot"></div>

<main class="welcome-container">
  <div class="welcome-card">
    <h1 class="welcome-card__title">Bem-vindo ao Mapa Interativo</h1>
    <p class="welcome-card__description">
      Seleciona o edifício e o piso que pretendes explorar para visualizar a planta detalhada e aceder às informações das salas.
    </p>

    <form id="selector-form" class="welcome-card__form">
      <div class="welcome-card__fields">
        <label class="field">
          <span class="field__label">Edifício</span>
          <select id="welcome-edificio" class="field__control">
            <option value="B" selected>Edifício B</option>
            <option value="A">Edifício A</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Piso</span>
          <select id="welcome-piso" class="field__control">
            <option value="0" selected>Piso 0</option>
            <option value="1">Piso 1</option>
          </select>
        </label>
      </div>

      <button type="submit" class="welcome-card__btn">Ver Planta</button>
    </form>
  </div>
</main>

<div id="footer-slot"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {
  // Carrega os Includes (Header/Footer)
  async function load(selector, path){
    const element = document.querySelector(selector);
    try {
      const response = await fetch(path);
      if(!response.ok) throw new Error(response.status);
      element.innerHTML = await response.text();
    } catch(err) {
      console.error("Erro ao carregar:", path, err);
    }
  }

  await load("#header-slot", "public/INCLUDES/header.html");
  await load("#footer-slot", "public/INCLUDES/footer.html");

  // Esconde os seletores do header na página de início (já que estão no cartão principal)
  const headerNav = document.querySelector(".site-header__nav");
  if (headerNav) {
    headerNav.style.display = "none";
  }

  // Controlo do formulário de seleção
  const selEdificio = document.getElementById("welcome-edificio");
  const selPiso = document.getElementById("welcome-piso");
  const form = document.getElementById("selector-form");

  // Ajusta pisos disponíveis consoante o edifício escolhido (Ex: Edifício A só tem Piso 0)
  selEdificio.addEventListener("change", () => {
    const optPiso1 = selPiso.querySelector('option[value="1"]');
    if (selEdificio.value === "A") {
      if (optPiso1) optPiso1.style.display = "none";
      selPiso.value = "0";
    } else {
      if (optPiso1) optPiso1.style.display = "block";
    }
  });

  // Redireciona para o mapa.html com os parâmetros na URL
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const ed = selEdificio.value;
    const pi = selPiso.value;
    window.location.href = `HTML/mapa.html?edificio=${ed}&piso=${pi}`;
  });
});
</script>

</body>
</html>
