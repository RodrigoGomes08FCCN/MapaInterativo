<!DOCTYPE html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa Interativo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

  <div id="header-slot"></div>

  <main class="app">

    <section class="map-panel">

      <div class="map-panel__heading">
        <h1 id="map-heading-title">Mapa Interativo</h1>
        <span class="map-panel__hint">
          Clica numa divisória para veres os detalhes →
        </span>
      </div>

      <div class="map-frame">

        <!-- O SVG será carregado aqui pelo JavaScript -->
        <div id="svg-container"></div>

      </div>

    </section>

    <aside class="detail-panel" aria-live="polite">

      <div class="detail-panel__empty" id="detail-empty">

        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M3 21V9.5L12 3l9 6.5V21h-6v-7H9v7H3Z" stroke-linejoin="round" />
        </svg>

        Seleciona uma divisória na planta<br>
        para veres a ficha da sala.

      </div>

      <div class="detail-card" id="detail-card">

        <div class="detail-card__image" id="detail-image">
          <span></span>
        </div>

        <div>
          <div class="detail-card__id" id="detail-id"></div>
        </div>

        <dl class="detail-card__meta">

          <div class="detail-card__stat">
            <dt>Função</dt>
            <dd id="detail-funcao"></dd>
          </div>

          <div class="detail-card__stat">
            <dt>Nº máx. lugares</dt>
            <dd id="detail-capacidade"></dd>
          </div>

        </dl>

        <button class="detail-card__close" id="detail-email">
          Reservar
        </button>

        <button class="detail-card__close" id="detail-close">
          Fechar ficha
        </button>

      </div>

    </aside>

  </main>

  <div id="footer-slot"></div>

  <script src="JS/rooms-data.js"></script>
  <script src="JS/script.js"></script>

</body>

</html>
