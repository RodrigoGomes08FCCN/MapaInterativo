<!DOCTYPE html>
<html lang="pt-PT">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seleção de Planta — Mapa Interativo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="public/assets/CSS/style.css">
</head>

<body>

  <div id="header-slot"></div>

  <main class="landing-container">
    <div class="landing-card">
      <h1 class="landing-title">Selecionar Edifício e Piso</h1>
      <p class="landing-subtitle">Escolhe a planta que pretendes consultar no mapa interativo.</p>

      <form id="landing-form" class="landing-form">
        <label class="field">
          <span class="field__label">Edifício</span>
          <select id="landing-select-edificio" class="field__control">
            <option value="B" selected>Edifício B</option>
            <option value="A">Edifício A</option>
          </select>
        </label>

        <label class="field">
          <span class="field__label">Piso</span>
          <select id="landing-select-piso" class="field__control">
            <option value="0" selected>Piso 0</option>
            <option value="1">Piso 1</option>
          </select>
        </label>

        <button type="submit" class="landing-btn">Ver Planta</button>
      </form>
    </div>
  </main>

  <div id="footer-slot"></div>

  <script>
    async function loadInclude(targetSelector, path) {
      const target = document.querySelector(targetSelector);
      if (!target) return;
      try {
        const res = await fetch(path);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        target.innerHTML = await res.text();
      } catch (err) {
        console.warn("Falha ao carregar include:", path, err);
      }
    }

    document.addEventListener("DOMContentLoaded", async () => {
      await Promise.all([
        loadInclude("#header-slot", "public/INCLUDES/header.html"),
        loadInclude("#footer-slot", "public/INCLUDES/footer.html")
      ]);

      // Ocultar a navegação do header na página inicial
      const navHeader = document.querySelector(".site-header__nav");
      if (navHeader) {
        navHeader.style.display = "none";
      }

      const selEdificio = document.getElementById("landing-select-edificio");
      const selPiso = document.getElementById("landing-select-piso");
      const form = document.getElementById("landing-form");

      const updatePisoOptions = (edificio) => {
        const optPiso1 = selPiso.querySelector('option[value="1"]');
        if (optPiso1) {
          if (edificio === "A") {
            optPiso1.style.display = "none";
            if (selPiso.value === "1") selPiso.value = "0";
          } else {
            optPiso1.style.display = "block";
          }
        }
      };

      selEdificio.addEventListener("change", () => updatePisoOptions(selEdificio.value));
      updatePisoOptions(selEdificio.value);

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const ed = selEdificio.value;
        const piso = selPiso.value;
        window.location.href = `HTML/mapa.html?edificio=${ed}&piso=${piso}`;
      });
    });
  </script>

</body>

</html>
